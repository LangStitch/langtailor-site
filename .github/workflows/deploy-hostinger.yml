name: Deploy to Hostinger

# Publishes langtailor.langstitch.com to Hostinger over FTPS.
# The FTP account (secrets) is scoped to the langtailor docroot (deploy to ./).
# Do not share deploy credentials with langstitch-site — product deploys must not overwrite this tree.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check FTP configuration
        id: ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -z "$FTP_SERVER" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Hostinger deploy — FTP secrets are not configured."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.ftp.outputs.configured == 'true'
        uses: actions/checkout@v7

      - name: Deploy via FTPS
        if: steps.ftp.outputs.configured == 'true'
        id: ftps
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
          timeout: 120000
          state-name: langtailor-hostinger-v3
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md

      - name: Verify live site
        if: steps.ftp.outputs.configured == 'true' && steps.ftps.outcome == 'success'
        run: |
          set -euo pipefail
          URL="https://langtailor.langstitch.com/"
          for i in 1 2 3 4 5 6; do
            BODY="$(curl -fsSL --compressed -H "Cache-Control: no-cache" "$URL" 2>/dev/null || true)"
            if grep -Fq 'nav-logo__title' <<<"$BODY" && grep -Fq 'Download LangTailor' <<<"$BODY"; then
              if grep -Fq 'styles.css?v=5' <<<"$BODY"; then
                echo "Live langtailor site OK at $URL (attempt $i)."
                exit 0
              fi
            fi
            echo "Waiting for langtailor.langstitch.com to update (attempt $i/6)…"
            sleep 15
          done
          echo "::error::langtailor.langstitch.com did not serve the expected build after deploy."
          exit 1
