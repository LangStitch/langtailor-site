name: Deploy to Hostinger

# Publishes the static site to Hostinger (the live host for
# langtailor.langstitch.com) over FTPS on every push to main.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   FTP_SERVER    - Hostinger FTP host (e.g. ftp.langstitch.com or the IP)
#   FTP_USERNAME  - FTP account username
#   FTP_PASSWORD  - FTP account password
# Optional repository variable:
#   FTP_SERVER_DIR - target docroot for the subdomain
#                    (defaults to public_html/langtailor/)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip when FTP secrets are not configured (avoids failing CI on forks / unset repos).
    if: ${{ secrets.FTP_SERVER != '' && secrets.FTP_USERNAME != '' && secrets.FTP_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ vars.FTP_SERVER_DIR || 'public_html/langtailor/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
