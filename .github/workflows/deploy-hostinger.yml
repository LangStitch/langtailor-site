name: Deploy to Hostinger

# Publishes the static site to Hostinger (the live host for
# langtailor.langstitch.com) over FTPS on every push to main.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   FTP_SERVER    - Hostinger FTP IP from hPanel Plan Details (not ftp.langstitch.com
#                   unless that hostname resolves — use the FTP IP shown in hPanel)
#   FTP_USERNAME  - FTP account username (e.g. u743467360.langstitchdeployer)
#   FTP_PASSWORD  - FTP account password
# Optional repository variable:
#   FTP_SERVER_DIR - target docroot for the subdomain
#                    (defaults to domains/langtailor.langstitch.com/public_html/)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check FTP configuration
        id: ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -z "$FTP_SERVER" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Hostinger deploy — FTP secrets are not configured."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.ftp.outputs.configured == 'true'
        uses: actions/checkout@v7

      - name: Deploy via FTPS
        if: steps.ftp.outputs.configured == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ vars.FTP_SERVER_DIR || 'domains/langtailor.langstitch.com/public_html/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
